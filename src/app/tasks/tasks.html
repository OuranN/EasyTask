@if (isAddingTask()) {
  <app-new-task (cancelAddTask)="onEndAddTask()" (add)="onAddTask($event)"></app-new-task>
}

<section id="tasks">
  <header>
    <h2>{{selectUser()?.name}} Tasks</h2>
    <menu>
      <button (click)="onStartAddTask()"> Add Task </button>
    </menu>
  </header>

  <ul>
      @for (task of tasksUserSelected(); track task.id) {
       <li>
          <app-task [task]="task" [userId]="selectUser()!.id" (taskComplete)="onTaskComplete($event)"></app-task>
       </li>
      }
  </ul>
</section>
